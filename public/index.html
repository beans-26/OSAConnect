<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#6366f1">
    <meta name="description" content="OSA Connect - Student Violation and Punishment Monitoring System">
    <title>OSA Connect | Violation Monitoring System</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="/socket.io/socket.io.js"></script>
    <!-- QR Code Scanner Library -->
    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
</head>

<body>
    <!-- Login Screen -->
    <div id="login-screen" class="overlay">
        <div class="login-card">
            <div class="logo">
                <i class="fas fa-shield-halved"></i>
                <span>OSA<span>Connect</span></span>
            </div>
            <p class="login-subtitle">Violation and Punishment Monitoring</p>
            <!-- Login Form -->
            <div id="login-container">
                <form id="login-form">
                    <div class="form-group">
                        <label>Username / Student ID</label>
                        <input type="text" id="login-username" required placeholder="Enter your ID"
                            autocomplete="username">
                    </div>
                    <div class="form-group">
                        <label>Password</label>
                        <input type="password" id="login-password" required placeholder="••••••••"
                            autocomplete="current-password">
                    </div>
                    <button type="submit" class="btn-primary"
                        style="width: 100%; padding: 1rem; margin-top: 1rem; justify-content: center; font-size: 1rem;">
                        Sign In
                    </button>
                </form>
                <div class="auth-footer" style="margin-top: 1.5rem; text-align: center;">
                    <p>New Student? <a href="#" id="show-register"
                            style="color: var(--primary); font-weight: 600;">Create an Account</a></p>
                </div>
            </div>

            <!-- Registration Form -->
            <div id="register-container" class="hidden">
                <form id="register-form">
                    <div class="form-group">
                        <label>Student ID</label>
                        <input type="text" id="reg-id" required placeholder="e.g. 2024-001">
                    </div>
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                        <div class="form-group">
                            <label>First Name</label>
                            <input type="text" id="reg-fname" required>
                        </div>
                        <div class="form-group">
                            <label>Last Name</label>
                            <input type="text" id="reg-lname" required>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Department</label>
                        <select id="reg-dept" required>
                            <option value="">Select Department</option>
                        </select>
                    </div>
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                        <div class="form-group">
                            <label>Course</label>
                            <input type="text" id="reg-course" required placeholder="e.g. BSCS">
                        </div>
                        <div class="form-group">
                            <label>Year Level</label>
                            <input type="number" id="reg-year" required min="1" max="5">
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Set Password</label>
                        <input type="password" id="reg-pass" required placeholder="••••••••">
                    </div>
                    <button type="submit" class="btn-primary"
                        style="width: 100%; padding: 1rem; margin-top: 1rem; justify-content: center; font-size: 1rem;">Register
                        Now</button>
                </form>
                <div class="auth-footer" style="margin-top: 1.5rem; text-align: center;">
                    <p>Already have an account? <a href="#" id="show-login"
                            style="color: var(--primary); font-weight: 600;">Sign In</a></p>
                </div>
            </div>

            <p id="login-error" class="error-text hidden">Invalid credentials. Please try again.</p>
        </div>
    </div>

    <!-- Sidebar Overlay (mobile) -->
    <div id="sidebar-overlay" class="sidebar-overlay"></div>

    <!-- Main System Container -->
    <div id="app-container" class="app-container hidden">
        <!-- Sidebar -->
        <aside id="sidebar" class="sidebar">
            <div class="logo">
                <i class="fas fa-shield-halved"></i>
                <span>OSA<span>Connect</span></span>
            </div>
            <nav id="main-nav">
                <!-- Nav items injected by JS based on role -->
            </nav>
            <div class="sidebar-footer">
                <div class="user-info">
                    <p id="user-display-name">Loading...</p>
                    <span id="user-display-role">Role</span>
                </div>
                <button id="logout-btn" class="theme-toggle">
                    <i class="fas fa-sign-out-alt"></i> Logout
                </button>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header>
                <div class="header-left">
                    <button id="mobile-menu-btn" class="mobile-menu-btn" aria-label="Toggle menu">
                        <i class="fas fa-bars"></i>
                    </button>
                    <h2 id="current-view-title">Dashboard</h2>
                </div>
                <div class="user-profile">
                    <div class="notifications" id="notification-bell">
                        <i class="fas fa-bell"></i>
                        <span class="badge hidden" id="notif-count">0</span>
                    </div>
                    <div class="avatar">
                        <img id="user-avatar" src="https://ui-avatars.com/api/?name=User&background=6366f1&color=fff"
                            alt="User">
                    </div>
                </div>
            </header>

            <div id="page-content" class="content-wrapper">
                <!-- Views injected here by JS -->
            </div>
        </main>

        <!-- Mobile Bottom Nav -->
        <div id="mobile-bottom-nav" class="mobile-bottom-nav">
            <div class="nav-items" id="mobile-nav-items">
                <!-- Injected by JS based on role -->
            </div>
        </div>
    </div>

    <!-- Notification Toast -->
    <div id="notif-toast" class="toast hidden">
        <div class="toast-content">
            <i class="fas fa-info-circle"></i>
            <div class="toast-text">
                <strong>New Violation Reported</strong>
                <p id="toast-msg">Student ID: 2024-001</p>
            </div>
        </div>
    </div>

    <!-- Modals -->
    <div id="modal-container" class="modal-overlay hidden">
        <div class="modal">
            <div class="modal-header">
                <h2 id="modal-title">Record Violation</h2>
                <button class="close-modal"><i class="fas fa-times"></i></button>
            </div>
            <div id="modal-body" class="modal-body">
                <!-- Form content -->
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
